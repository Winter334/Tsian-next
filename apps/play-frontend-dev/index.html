<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tsian 游戏前端（开发）</title>
  <link rel="stylesheet" href="/src/style.css" />
  <!-- main.ts 是 ESM module，vite dev 热加载入口 -->
  <!-- module 脚本自动 deferred，无需 defer 属性 -->
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div id="app" class="app">
    <header class="app-header">
      <div class="header-left">
        <span class="app-title">Tsian</span>
        <span id="status" class="app-status" data-state="loading">连接中…</span>
      </div>
      <div class="header-right">
        <span id="turn-badge" class="turn-badge" hidden>第 <b id="turn-num">0</b> 回</span>
      </div>
    </header>
    <div class="body">
      <!-- 中间列：视图舞台 + composer；与右侧导航栏为兄弟，导航栏贯穿到底 -->
      <div class="stage">
        <!-- 中间视图舞台：同一时刻只显示一个视图，切换时不销毁 DOM（保留剧情滚动位置） -->
        <main id="story" class="story view view-active" aria-live="polite">
          <div class="empty-state" id="empty-state">
            <p class="empty-title">故事尚未开始</p>
            <p class="empty-hint">在下方输入你的行动，开启冒险。</p>
          </div>
        </main>
        <!-- 检查点回溯视图：卡片列表，切换到此视图时由 main.ts 动态填充 -->
        <section id="checkpoint-view" class="view view-checkpoint" hidden aria-live="polite"></section>
        <!-- composer 与正文同列，居中基准一致 → 输入框与正文对齐 -->
        <footer class="composer">
          <div class="composer-inner">
            <textarea id="input" class="input" rows="1" placeholder="输入你的行动…（Enter 发送，Shift+Enter 换行）" disabled></textarea>
            <button id="send" class="send" type="button" disabled>发送</button>
            <button id="stop" class="stop" type="button" hidden>停止</button>
          </div>
        </footer>
      </div>
      <!-- 右侧导航栏：剧情（默认）/ 回溯 / 未来功能项 -->
      <nav class="sidebar-right" aria-label="视图导航">
        <button class="nav-item active" type="button" data-view="story" title="剧情">
          <span class="nav-glyph">§</span><span class="nav-label">剧情</span>
        </button>
        <button class="nav-item" type="button" data-view="checkpoints" title="回溯" disabled>
          <span class="nav-glyph">⟲</span><span class="nav-label">回溯</span>
        </button>
      </nav>
    </div>
  </div>
</body>
</html>
